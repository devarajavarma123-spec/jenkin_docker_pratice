<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clothing Store</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #f5f5f5;
}

/* Header */
header {
    background: #111;
    color: #fff;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    font-size: 22px;
}

.cart-btn {
    background: #ff4d4d;
    padding: 8px 15px;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

/* Products */
.container {
    padding: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.card h3 {
    font-size: 18px;
}

.price {
    color: green;
    margin: 10px 0;
}

.btn {
    width: 100%;
    padding: 10px;
    background: #111;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

/* Cart */
.cart {
    position: fixed;
    right: -350px;
    top: 0;
    width: 350px;
    height: 100%;
    background: white;
    box-shadow: -5px 0 15px rgba(0,0,0,0.2);
    padding: 20px;
    transition: 0.4s;
    overflow-y: auto;
}

.cart.active {
    right: 0;
}

.cart h2 {
    margin-bottom: 15px;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

.total {
    margin-top: 20px;
    font-weight: bold;
}

/* Responsive */
@media(max-width:600px) {
    header h1 {
        font-size: 18px;
    }
}
</style>
</head>

<body>

<header>
    <h1>🛍️ Trendy Clothes</h1>
    <button class="cart-btn" onclick="toggleCart()">Cart (<span id="count">0</span>)</button>
</header>

<div class="container" id="products"></div>

<!-- Cart -->
<div class="cart" id="cart">
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <div class="total">Total: ₹<span id="total">0</span></div>
</div>

<script>
const products = [
    {id:1, name:"T-Shirt", price:499, img:"https://picsum.photos/300?1"},
    {id:2, name:"Jeans", price:999, img:"https://picsum.photos/300?2"},
    {id:3, name:"Hoodie", price:1299, img:"https://picsum.photos/300?3"},
    {id:4, name:"Jacket", price:1999, img:"https://picsum.photos/300?4"},
    {id:5, name:"Sneakers", price:1499, img:"https://picsum.photos/300?5"},
    {id:6, name:"Cap", price:299, img:"https://picsum.photos/300?6"}
];

let cart = [];

function renderProducts() {
    const container = document.getElementById("products");
    container.innerHTML = "";

    products.forEach(p => {
        container.innerHTML += `
            <div class="card">
                <img src="${p.img}">
                <div class="card-content">
                    <h3>${p.name}</h3>
                    <div class="price">₹${p.price}</div>
                    <button class="btn" onclick="addToCart(${p.id})">Add to Cart</button>
                </div>
            </div>
        `;
    });
}

function addToCart(id) {
    const product = products.find(p => p.id === id);
    cart.push(product);
    updateCart();
}

function updateCart() {
    const cartItems = document.getElementById("cart-items");
    const count = document.getElementById("count");
    const total = document.getElementById("total");

    cartItems.innerHTML = "";
    let sum = 0;

    cart.forEach((item, index) => {
        sum += item.price;

        cartItems.innerHTML += `
            <div class="cart-item">
                <span>${item.name}</span>
                <span>₹${item.price}</span>
            </div>
        `;
    });

    count.innerText = cart.length;
    total.innerText = sum;
}

function toggleCart() {
    document.getElementById("cart").classList.toggle("active");
}

renderProducts();
</script>

</body>
</html>
